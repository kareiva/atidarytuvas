<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Door Control</h1>

        <div id="registrationStatus" class="info-box">
            <p>SIP Status:</p>
            <p id="sipStatusText" class="status-text">Checking...</p>
        </div>

        <div id="buttonsContainer" class="buttons-container">
            <!-- Buttons will be dynamically generated here -->
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="info-text">
            <p>Opens door via GSM call. Automatically hangs up 10 seconds after answer.</p>
        </div>
    </div>

    <script>
        const buttonsContainer = document.getElementById('buttonsContainer');
        const statusMessage = document.getElementById('statusMessage');
        const sipStatusText = document.getElementById('sipStatusText');
        const registrationStatus = document.getElementById('registrationStatus');

        let callButtons = [];
        let isRegistered = false;

        // Load targets and create buttons
        async function loadTargets() {
            try {
                const response = await fetch('/targets');
                const data = await response.json();

                // Clear existing buttons
                buttonsContainer.innerHTML = '';
                callButtons = [];

                // Create a button for each target
                data.targets.forEach(target => {
                    const button = document.createElement('button');
                    button.className = 'call-button';
                    button.textContent = `Open ${target.charAt(0) + target.slice(1).toLowerCase()}`;
                    button.dataset.target = target;
                    button.disabled = !isRegistered;

                    button.addEventListener('click', () => makeCall(target, button));

                    buttonsContainer.appendChild(button);
                    callButtons.push(button);
                });
            } catch (error) {
                console.error('Error loading targets:', error);
                statusMessage.textContent = 'Error: Failed to load targets';
                statusMessage.className = 'status-message error';
            }
        }

        // Check SIP registration status
        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                if (data.registered) {
                    sipStatusText.textContent = 'Registered & Ready';
                    sipStatusText.className = 'status-text registered';
                    registrationStatus.className = 'info-box registered';
                    isRegistered = true;
                    callButtons.forEach(btn => btn.disabled = false);
                } else if (data.sip_client_initialized) {
                    sipStatusText.textContent = 'Connecting...';
                    sipStatusText.className = 'status-text connecting';
                    registrationStatus.className = 'info-box connecting';
                    isRegistered = false;
                    callButtons.forEach(btn => btn.disabled = true);
                } else {
                    sipStatusText.textContent = 'Not Connected';
                    sipStatusText.className = 'status-text error';
                    registrationStatus.className = 'info-box error';
                    isRegistered = false;
                    callButtons.forEach(btn => btn.disabled = true);
                }
            } catch (error) {
                sipStatusText.textContent = 'Status Unknown';
                sipStatusText.className = 'status-text error';
                registrationStatus.className = 'info-box error';
                isRegistered = false;
                callButtons.forEach(btn => btn.disabled = true);
            }
        }

        // Make a call to the specified target
        async function makeCall(target, button) {
            const originalText = button.textContent;

            // Disable all buttons during call
            callButtons.forEach(btn => btn.disabled = true);
            button.textContent = 'Opening...';
            statusMessage.textContent = `Initiating ${target.toLowerCase()} open...`;
            statusMessage.className = 'status-message info';

            try {
                const response = await fetch('/call', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ target: target })
                });

                const data = await response.json();

                if (data.success) {
                    statusMessage.textContent = `${target.charAt(0) + target.slice(1).toLowerCase()} opening signal sent`;
                    statusMessage.className = 'status-message success';

                    // Re-enable buttons after 11 seconds (when call ends)
                    setTimeout(() => {
                        callButtons.forEach(btn => btn.disabled = false);
                        button.textContent = originalText;
                        statusMessage.textContent = '';
                        statusMessage.className = 'status-message';
                    }, 11000);
                } else {
                    statusMessage.textContent = 'Error: ' + data.message;
                    statusMessage.className = 'status-message error';
                    callButtons.forEach(btn => btn.disabled = false);
                    button.textContent = originalText;
                    // Re-check status in case registration was lost
                    checkStatus();
                }
            } catch (error) {
                statusMessage.textContent = 'Error: Failed to connect to server';
                statusMessage.className = 'status-message error';
                callButtons.forEach(btn => btn.disabled = false);
                button.textContent = originalText;
            }
        }

        // Initialize on page load
        loadTargets().then(() => {
            checkStatus();
            // Refresh status every 5 seconds
            setInterval(checkStatus, 5000);
        });
    </script>
</body>
</html>
